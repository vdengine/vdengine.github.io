<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodic Table | VD Engine</title>

  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #e2e8f0;
      font-family: 'Segoe UI', Consolas, monospace;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 4px;
      color: #fff;
      border-left: 4px solid #3b82f6;
      padding-left: 15px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 30px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #3b82f6;
    }

    /* 週期表網格設定 */
    .periodic-grid {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 6px;
      background-color: #000;
    }

    .element {
      border: 1px solid #334155;
      background-color: #0f172a;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px 4px;
      transition: all 0.2s ease;
      cursor: default;
    }

    .element:hover {
      border-color: #3b82f6;
      background-color: #1e293b;
      transform: scale(1.05);
      z-index: 10;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    .number {
      font-size: 10px;
      text-align: left;
      color: #94a3b8;
    }

    .symbol {
      font-size: 1.2vw; /* 隨視窗大小縮放文字 */
      font-weight: bold;
      text-align: center;
      color: #f8fafc;
    }

    .mass {
      font-size: 9px;
      text-align: center;
      color: #64748b;
    }

    .empty {
      visibility: hidden;
    }

    /* 響應式微調：在小螢幕上縮小間距 */
    @media (max-width: 768px) {
      .periodic-grid { gap: 2px; }
      body { padding: 10px; }
    }
  </style>
</head>
