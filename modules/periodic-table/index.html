<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Periodic Table | VD Engine</title>

  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #e2e8f0;
      font-family: Consolas, monospace;
      padding: 60px 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 14px;
    }

    .back-link:hover {
      color: white;
    }

    .periodic-grid {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 4px;
    }

    .element {
      border: 1px solid #1f2937;
      padding: 10px;
      text-align: center;
      background-color: #0a0a0a;
      font-size: 14px;
    }

    .empty {
      visibility: hidden;
    }

  </style>
</head>

<body>

  <a class="back-link" href="/modules/index.html">← Back to Modules</a>

  <h1>PERIODIC TABLE</h1>

  <div class="periodic-grid">

    <!-- 第一列 -->
    <div class="element">H</div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="element">He</div>

  </div>

</body>
</html>
