<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Periodic Table</title>

  <style>
    .periodic-table {
      display: grid;
      grid-template-columns: repeat(18, 60px);
      gap: 4px;
      margin-top: 40px;
      width: 100%;
    }

    .cell {
      aspect-ratio: 1 / 1;
      height: 60px;
      background: #1e293b;
      color: white;
      display: flex;
      align-items: center;
    }
  </style>
</head>

<body>
  <div class="periodic-table">
    <div class="cell" style="grid-column: 1;">1</div>
    <div class="cell" style="grid-column: 18;">2</div>
  </div>
</body>

</html>
