<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Periodic Table | VD Engine</title>

  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #e2e8f0;
      font-family: Consolas, monospace;
      padding: 60px 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 14px;
    }

    .back-link:hover {
      color: white;
    }

    .periodic-grid {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 6px;
}

.element {
  border: 1px solid #1f2937;
  background-color: #0a0a0a;
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 6px;
}

.number {
  font-size: 10px;
  text-align: left;
  opacity: 0.7;
}

.symbol {
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

.mass {
  font-size: 10px;
  text-align: center;
  opacity: 0.6;
}

.empty {
  visibility: hidden;
}

  </style>
</head>

  <body>

  <a class="back-link" href="/modules/index.html">← Back to Modules</a>

  <h1>PERIODIC TABLE</h1>

  <div class="periodic-grid">

    <!-- 第一列 -->

    <div class="element">
      <div class="number">1</div>
      <div class="symbol">H</div>
      <div class="mass">1.008</div>
    </div>

    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="empty"></div>

    <div class="element">
      <div class="number">2</div>
      <div class="symbol">He</div>
      <div class="mass">4.0026</div>
    </div>

  </div>

</body>

</html>
