<!DOCTYPE html>
<html>
<head>
  <title>VD Engine</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: Consolas, monospace;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 40px;
      letter-spacing: 2px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    p {
      opacity: 0.7;
      font-size: 16px;
      position: relative;
      z-index: 1;
    }

    nav {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 40px;
      z-index: 1;
    }

    nav a {
      text-decoration: none;
      color: #94a3b8;
      font-size: 14px;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    nav a:hover {
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }
  </style>
</head>

<body>
  <canvas id="stars"></canvas>

  <div>
    <h1>VD Engine 2026</h1>
    <p>Human × AI Co-Engineering Core</p>
  </div>

  <nav>
    <a href="#">LOG</a>
    <a href="#">PROJECT</a>
    <a href="#">PHILOSOPHY</a>
  </nav>

  <script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

function createStar() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 2 + 0.5
  };
}

for (let i = 0; i < 200; i++) {
  stars.push(createStar());
}

function draw() {
  ctx.fillStyle = "#0f172a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach((star, index) => {
    star.x -= star.speed; // 向左飄（代表我們往前飛）

    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();

    if (star.x < 0) {
      stars[index] = {
        x: canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 2 + 0.5
      };
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
